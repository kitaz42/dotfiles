# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = _GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# MONIC
monitor=, 1920x1080@74.97, auto, 1

# FIRE CLAVICH
bind = SUPER, Q, exec, kitty
bind = SUPER, M, exit
bind = SUPER, C, killactive
input {
	kb_layout = us,ru
	kb_options = grp:alt_shift_toggle
}
$mainMod = SUPER

# Переключение рабочих столов (Super + цифра)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Перенос активного окна на другой стол (Super + Shift + цифра)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Переключение воркспейсов скроллом мыши (Super + колесико)
bind = $mainMod, mouse_up, workspace, -1
bind = $mainMod, mouse_down, workspace, +1


bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

exec-once = waybar
exec-once = awww-daemon
exec-once = awww img /home/bezdar/Downloads/1642457385_3-abrakadabra-fun-p-vaibovii-fon-3.jpg
exec-once = nvidia-settings -a "[gpu:0]/GPUPowerMizerMode=1"
exec-once = sudo nvidia-smi -pm 1
exec-once = sudo nvidia-smi -lgc 1470,1950
exec-once = sudo nvidia-smi -pl 145
exec-once = sudo cpupower frequency-set -g performance

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# --- ВНЕШНИЙ ВИД (БАЗОВЫЙ) ---
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(bb9af7ee)
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 30
    blur {
        enabled = true
        size = 0
        passes = 3
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

}
windowrule {
    name = floating_kitty
    match:class = kitty-float
    float = true
    size = 1000 700
}
